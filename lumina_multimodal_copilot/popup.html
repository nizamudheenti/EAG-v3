<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina AI - Configuration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 330px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #cbd5e1;
    }

    .header {
      background: linear-gradient(135deg, #1e1b4b, #0f172a);
      padding: 16px 20px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.25);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6, #d946ef);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
    }

    .title-area { display: flex; flex-direction: column; }
    .title { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
    .subtitle { font-size: 10px; color: rgba(148, 163, 184, 0.7); margin-top: 1px; }

    .content { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.3);
      color: #fff;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(139, 92, 246, 0.15));
      border-color: rgba(139, 92, 246, 0.35);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.25), rgba(139, 92, 246, 0.25));
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(148, 163, 184, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 10px;
      color: #f1f5f9;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: rgba(139, 92, 246, 0.5);
    }

    select.input-field {
      cursor: pointer;
      color-scheme: dark;
    }

    .save-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }

    .btn-save {
      background: #8b5cf6;
      border: none;
      border-radius: 6px;
      color: white;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-save:hover { background: #a78bfa; }

    .status-text {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.5);
      flex: 1;
    }

    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
      color: rgba(148, 163, 184, 0.5);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #94a3b8;
      display: inline-block;
      margin-right: 4px;
    }

    .status-dot.active { background: #22c55e; }

    .shortcut {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 9.5px;
      color: #c084fc;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦</div>
    <div class="title-area">
      <div class="title">Lumina AI</div>
      <div class="subtitle">Multimodal Web Companion</div>
    </div>
  </div>

  <div class="content">
    <button class="btn btn-primary" id="btn-open-sidebar">
      💬 Open Sidebar
    </button>

    <div style="height:1px; background:rgba(255,255,255,0.06);"></div>

    <!-- API Key -->
    <div class="form-group">
      <div class="label">Gemini API Key</div>
      <input class="input-field" id="api-key-input" type="password" placeholder="AIzaSy..." />
    </div>

    <!-- Model Version selection -->
    <div class="form-group">
      <div class="label">Model Tier</div>
      <select class="input-field" id="model-select">
        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite (Fastest)</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (Economic)</option>
        <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash (Default)</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
      </select>
    </div>

    <div class="save-row">
      <span class="status-text" id="api-status">Configure API Key to start</span>
      <button class="btn-save" id="btn-save-settings">Save</button>
    </div>
  </div>

  <div class="footer">
    <div>
      <span class="status-dot" id="status-dot"></span>
      <span id="footer-status">No Key Saved</span>
    </div>
    <span class="shortcut">Ctrl+Shift+L</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>

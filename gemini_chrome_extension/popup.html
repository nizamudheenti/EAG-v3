<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeminiPage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px;
      border-bottom: 1px solid rgba(99,102,241,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .title { font-size: 16px; font-weight: 700; color: #fff; }
    .subtitle { font-size: 11px; color: rgba(148,163,184,0.7); margin-top: 2px; }

    .content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      color: #fff;
    }

    .btn-icon { font-size: 18px; }
    .btn-text { display: flex; flex-direction: column; }
    .btn-label { font-weight: 600; }
    .btn-desc { font-size: 11px; color: rgba(148,163,184,0.6); margin-top: 1px; }

    .primary {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border-color: rgba(99,102,241,0.4);
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .api-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .api-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(148,163,184,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .api-row {
      display: flex; gap: 8px;
    }

    .api-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      padding: 7px 10px;
      color: #e2e8f0;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }

    .api-input:focus { border-color: rgba(99,102,241,0.5); }

    .api-save {
      background: #6366f1;
      border: none;
      border-radius: 7px;
      color: white;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .api-save:hover { background: #7c3aed; }

    .status-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: rgba(148,163,184,0.5);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }

    .dot.inactive { background: #94a3b8; }

    .shortcut {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: #a5b4fc;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦</div>
    <div>
      <div class="title">GeminiPage</div>
      <div class="subtitle">AI Web Intelligence · Flash 2.0</div>
    </div>
  </div>

  <div class="content">
    <button class="btn primary" id="btn-open">
      <span class="btn-icon">💬</span>
      <span class="btn-text">
        <span class="btn-label">Open AI Panel</span>
        <span class="btn-desc">Chat about this page</span>
      </span>
    </button>

    <button class="btn" id="btn-summarize">
      <span class="btn-icon">📄</span>
      <span class="btn-text">
        <span class="btn-label">Summarize Page</span>
        <span class="btn-desc">Get a quick overview</span>
      </span>
    </button>

    <div class="divider"></div>

    <div class="api-section">
      <div class="api-label">Gemini API Key</div>
      <div class="api-row">
        <input class="api-input" id="api-key-input" type="password" placeholder="AIza..." />
        <button class="api-save" id="api-save-btn">Save</button>
      </div>
      <div id="api-status" style="font-size:11px;margin-top:6px;color:rgba(148,163,184,0.5);"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Loading...</span>
    <span class="shortcut">Ctrl+Shift+G</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body { 
        width: 220px; 
        padding: 20px; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        background-color: #f3f4f6;
      }
      h2 {
        margin-top: 0;
        font-size: 18px;
        color: #1f2937;
      }
      button { 
        padding: 12px 15px; 
        background: #dc2626; /* Mozilla Red style */
        color: white; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        width: 100%; 
        font-weight: bold;
        transition: background 0.2s;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      button:hover { 
        background: #b91c1c; 
      }
      #status { 
        margin-top: 15px; 
        font-size: 14px; 
        color: #4b5563; 
        height: 20px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h2>PDF Converter</h2>
    <p style="font-size: 12px; color: #6b7280; margin-top: -10px; margin-bottom: 20px;">Save this entire page as a document.</p>
    
    <button id="pdfBtn">Download as PDF</button>
    <div id="status"></div>
    
    <script src="popup.js"></script>
  </body>
</html>
